<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ============================= -->
    <!-- Basic Meta Configuration -->
    <!-- ============================= -->
    <meta charset="utf-8" />

    <!-- Responsive Design -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Theme & Browser UI -->
    <meta name="theme-color" content="#121212" />
    <meta name="color-scheme" content="light dark" />

    <!-- SEO -->
    <meta
      name="description"
      content="Dynamo Fields - A dynamic and customizable React application for managing interactive fields and components."
    />
    <meta
      name="keywords"
      content="React, Dynamo Fields, Dynamic Forms, UI Components, Web Application"
    />
    <meta name="author" content="Dynamo Fields Team" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Dynamo Fields" />
    <meta
      property="og:description"
      content="Dynamic React application for building and managing customizable fields."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/dynamofields_icon.png" />

    <!-- Apple / Mobile Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/dynamofields_icon.png" />
    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/dynamofields_icon.png"
    />

    <!-- Web Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optional Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Page Title -->
    <title>Dynamo Fields</title>
  </head>

  <body>
    <!-- Fallback for Users Without JavaScript -->
    <noscript>
      You need to enable JavaScript to run Dynamo Fields.
    </noscript>

    <!-- React Root -->
    <div id="root"></div>

    <!--
      ==========================================
      Dynamo Fields - React Application Template
      ==========================================

      This file serves as the base HTML template for the application.

      Development:
        npm start

      Production Build:
        npm run build

      Features:
      - SEO friendly metadata
      - PWA manifest support
      - Responsive viewport setup
      - Social media sharing support
      - Performance optimizations
      - Dark mode compatible theme setup
    -->
  </body>
</html>
